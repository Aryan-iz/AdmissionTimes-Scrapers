name: Admitly Scraper Pipeline

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  run-scrapers:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          scraperapikey: ${{ secrets.SCRAPER_API_KEY }}
          Geminiapikey: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -o pipefail
          attempt=1
          max_attempts=2

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Starting scraper run (attempt $attempt/$max_attempts)"
            if python runner.py --exit-zero-on-failures 2>&1 | tee runner.log; then
              echo "Scraper run succeeded on attempt $attempt"
              break
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Scraper run failed on attempt $attempt. Retrying after 30 seconds..."
              sleep 30
            else
              echo "Scraper run failed after $max_attempts attempts."
              exit 1
            fi

            attempt=$((attempt + 1))
          done

      - name: Print failed scraper summary
        if: failure()
        run: |
          echo "---- Failed scraper lines ----"
          if [ -f runner.log ]; then
            grep -E "\[FAILED\]|RUN SUMMARY|Total scrapers|Succeeded|Failed" runner.log || true
          else
            echo "runner.log not found"
          fi

      - name: Upload scraper artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-artifacts-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            runner.log
            **/logs/**
            **/output/**
            **/*admissions*.json
